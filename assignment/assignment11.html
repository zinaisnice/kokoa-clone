<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width" />
      <title>Music</title>
      <link
         rel="stylesheet"
         href="https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css"
      />
      <link
         rel="stylesheet"
         href="https://cdn.jsdelivr.net/gh/FortAwesome/Font-Awesome@5.14.0/css/all.min.css"
      />
      <link rel="stylesheet" href="css/style11.css" />
      <script
         src="https://kit.fontawesome.com/e017701ff3.js"
         crossorigin="anonymous"
      ></script>
   </head>

   <body>
      <div class="screen">
         <header class="header">
            <i class="fa-solid fa-arrow-left"></i>
            <i class="fa-solid fa-magnifying-glass"></i>
         </header>

         <main class="main">
            <img
               src="https://search.pstatic.net/common?type=a&size=210&expire=1&refresh=true&quality=100&direct=true&src=http%3A%2F%2Fsstatic.naver.net%2Fpeople%2F168%2F20171012104804173.jpg"
               class="main__img"
            />
            <div class="main-info">
               <h1 class="main__title">Maroon5, The Creator</h1>
               <h5 class="h5">Rock band</h5>
            </div>
         </main>

         <section class="music-section">
            <div class="music-section_shuffle btn">
               <h5 class="h5">Shuffle</h5>
            </div>
            <div class="music-section__like btn">
               <i class="fa-solid fa-heart"></i>
               <h5 class="h5">1 523 431</h5>
            </div>
         </section>

         <ul class="music-list">
            <li class="music-list__i">
               <div class="music-list__info">
                  <img
                     src="https://search.pstatic.net/common?type=o&size=142x142&quality=100&direct=true&src=https%3A%2F%2Fmusicmeta-phinf.pstatic.net%2Falbum%2F003%2F198%2F3198839.jpg%3Ftype%3Dr204Fll%26v%3D20221103210415"
                     class="music-list__img"
                  />
                  <div class="music-list__title">
                     <h6 class="h6">Memories</h6>
                     <h5 class="h5">Memories</h5>
                  </div>
               </div>
               <i class="fa-solid fa-ellipsis-vertical"></i>
            </li>

            <li class="music-list__i selected">
               <div class="music-list__info">
                  <img
                     src="https://search.pstatic.net/common?type=o&size=142x142&quality=100&direct=true&src=https%3A%2F%2Fmusicmeta-phinf.pstatic.net%2Falbum%2F000%2F323%2F323972.jpg%3Ftype%3Dr204Fll%26v%3D20220503161701"
                     class="music-list__img"
                  />
                  <div class="music-list__title">
                     <h6 class="h6">Overexposed</h6>
                     <h5 class="h5">Payphone</h5>
                  </div>
                  <i class="fa-solid fa-music fa-lg play-icon"></i>
               </div>
               <i class="fa-solid fa-ellipsis-vertical"></i>
            </li>

            <li class="music-list__i">
               <div class="music-list__info">
                  <img
                     src="https://search.pstatic.net/common?type=o&size=142x142&quality=100&direct=true&src=https%3A%2F%2Fmusicmeta-phinf.pstatic.net%2Falbum%2F000%2F323%2F323972.jpg%3Ftype%3Dr204Fll%26v%3D20220503161701"
                     class="music-list__img"
                  />
                  <div class="music-list__title">
                     <h6 class="h6">Overexposed</h6>
                     <h5 class="h5">Lucky Strike</h5>
                  </div>
               </div>
               <i class="fa-solid fa-ellipsis-vertical"></i>
            </li>
            <li class="music-list__i">
               <div class="music-list__info">
                  <img
                     src="https://search.pstatic.net/common?type=o&size=142x142&quality=100&direct=true&src=https%3A%2F%2Fmusicmeta-phinf.pstatic.net%2Falbum%2F000%2F544%2F544284.jpg%3Ftype%3Dr204Fll%26v%3D20220426123509"
                     class="music-list__img"
                  />
                  <div class="music-list__title">
                     <h6 class="h6">V (Asia Tour Edition)</h6>
                     <h5 class="h5">Sugar</h5>
                  </div>
               </div>
               <i class="fa-solid fa-ellipsis-vertical"></i>
            </li>
         </ul>

         <section class="selected-music">
            <div class="selected-music__title">
               <h6 class="h6">Overexposed</h6>
               <h5 class="h5">Payphone</h5>
            </div>
            <div class="selected-music__icon">
               <i class="fa-solid fa-backward-step"></i>
               <i class="fa-solid fa-pause"></i>
               <i class="fa-solid fa-forward-step"></i>
            </div>
         </section>
      </div>

      <div class="screen">
         <header class="header">
            <i class="fa-solid fa-arrow-left"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i>
         </header>

         <main class="main">
            <img
               src="https://search.pstatic.net/common?type=o&size=142x142&quality=100&direct=true&src=https%3A%2F%2Fmusicmeta-phinf.pstatic.net%2Falbum%2F000%2F323%2F323972.jpg%3Ftype%3Dr204Fll%26v%3D20220503161701"
               class="main__img__2"
            />
            <div class="main-info">
               <h1 class="main__title">Payphone</h1>
               <h5 class="h5">Overexposed</h5>
            </div>
         </main>

         <section class="playing-music">
            <div class="playing-music__time">
               <span class="h6">1:34</span>
               <span class="h6">3:12</span>
            </div>
            <div class="playing-music__bar">
               <div class="playing-music__bar__behind">
                  <div class="playing-music__bar__front"></div>
               </div>
            </div>
         </section>

         <section class="playing-music-btn">
            <i class="fa-solid fa-repeat fa-xl"></i>
            <i class="fa-solid fa-backward-step fa-xl"></i>
            <i class="fa-solid fa-circle-play fa-4x"></i>
            <i class="fa-solid fa-forward-step fa-xl"></i>
            <i class="fa-solid fa-shuffle fa-xl"></i>
         </section>
      </div>
   </body>
</html>
