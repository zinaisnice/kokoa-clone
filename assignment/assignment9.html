<!DOCTYPE html>
<html>
   <head>
      <link rel="stylesheet" href="css/style9.css" />
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width" />
      <title>You Are Awesome!</title>
   </head>
   <body>
      <div class="behindbox">
         <div class="mainbox">
            <div class="mainbox__status-bar">
               <div class="mainbox__status-bar__column">
                  <svg
                     xmlns="http://www.w3.org/2000/svg"
                     fill="none"
                     viewBox="0 0 24 24"
                     stroke-width="1.5"
                     stroke="currentColor"
                     class="w-6 h-6 xMark"
                  >
                     <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M6 18L18 6M6 6l12 12"
                     />
                  </svg>
               </div>
               <div class="mainbox__status-bar__column">
                  <span>Playlist</span>
               </div>
            </div>

            <div class="mainbox__selected-music">
               <div class="mainbox__selected-music__column">
                  <div class="mainbox__selected-music__column__image">
                     <!-- image icon-->
                     <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="1.5"
                        stroke="currentColor"
                        class="w-6 h-6 image"
                     >
                        <path
                           stroke-linecap="round"
                           stroke-linejoin="round"
                           d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"
                        />
                     </svg>
                  </div>
               </div>
               <div class="mainbox__selected-music__column">
                  <div class="mainbox__selected-music__column__subject">
                     <span>Random Love</span>
                  </div>
                  <div class="mainbox__selected-music__column__writer">
                     <span>by Divay Kappor</span>
                  </div>
               </div>
            </div>

            <div class="mainbox__button">
               <div class="mainbox__button__column">
                  <div class="mainbox__button__column__image">
                     <div class="mainbox__button__column__image__play">
                        <svg
                           data-name="Layer 1"
                           xmlns="http://www.w3.org/2000/svg"
                           viewBox="0 0 16 16"
                           class="triangle"
                        >
                           <path d="m10 8-7 6V2l7 6z" />
                        </svg>
                        <span>play</span>
                     </div>
                  </div>
               </div>
               <div class="mainbox__button__column">
                  <div class="mainbox__button__column__image">
                     <div class="mainbox__button__column__image__heart">
                        <svg
                           xmlns="http://www.w3.org/2000/svg"
                           fill="none"
                           viewBox="0 0 24 24"
                           stroke-width="1.5"
                           stroke="currentColor"
                           class="w-6 h-6 heart"
                        >
                           <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"
                           />
                        </svg>
                     </div>
                  </div>
               </div>
               <div class="mainbox__button__column">
                  <div class="mainbox__button__column__image">
                     <div class="mainbox__button__column__iamge__plus">
                        <svg
                           xmlns="http://www.w3.org/2000/svg"
                           fill="none"
                           viewBox="0 0 24 24"
                           stroke-width="1.5"
                           stroke="currentColor"
                           class="w-6 h-6 plus"
                        >
                           <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M12 4.5v15m7.5-7.5h-15"
                           />
                        </svg>
                     </div>
                  </div>
               </div>
            </div>

            <div class="mainbox__playlist">
               <div class="mainbox__playlist__first">
                  <div class="mainbox__playlist__first__color"></div>
                  <div class="mainbox__playlist__first__text">
                     <div class="mainbox__playlist__first__text__subject">
                        <span>Matargasti</span>
                     </div>
                     <div class="mainbox__playlist__first__text__name">
                        <sapn>Mohit Chauhan</sapn>
                     </div>
                  </div>
               </div>
               <div class="mainbox__playlist__second">
                  <div class="mainbox__playlist__second__color"></div>
                  <div class="mainbox__playlist__second__text">
                     <div class="mainbox__playlist__second__text__subject">
                        <span>Attitude</span>
                     </div>
                     <div class="mainbox__playlist__second__text__writer">
                        <sapn>Lewis OfMan · Attitude</sapn>
                     </div>
                  </div>
               </div>
               <div class="mainbox__playlist__third">
                  <div class="mainbox__playlist__third__color"></div>
                  <div class="mainbox__playlist__third__text">
                     <div class="mainbox__playlist__third__text__subject">
                        <span>Try Everthing</span>
                     </div>
                     <div class="mainbox__playlist__third__text__writer">
                        <sapn>Shakira · Zootopia</sapn>
                     </div>
                  </div>
               </div>
               <div class="mainbox__playlist__fourth">
                  <div class="mainbox__playlist__fourth__color"></div>
                  <div class="mainbox__playlist__fourth__text">
                     <div class="mainbox__playlist__fourth__text__subject">
                        <span>Sunflower</span>
                     </div>
                     <div class="mainbox__playlist__fourth__text__writer">
                        <sapn>Joseph Vincent · Sunflower</sapn>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </body>
</html>
