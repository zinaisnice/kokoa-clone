<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width" />
      <title>repl.it</title>
      <link href="style03.css" rel="stylesheet" />
      <style>
         html {
            background-color: black;
         }
         body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
         }
         #main {
            background-color: rgb(120, 199, 202);
            width: 500px;
            height: 500px;
            position: relative;
         }
         @keyframes rotate {
            from {
               transform: rotate(0), translate(-10%, -10%);
            }
            to {
               transform: rotate(360deg);
            }
         }
         @keyframes sizeUp {
            0% {
               transform: scaleY(1);
            }
            50% {
               transform: scaleY(1.5);
            }
            100% {
               transform: scaleY(1);
            }
         }
         .circle {
            background-color: white;
            height: 10px;
            width: 10px;
            border-radius: 50%;
            position: absolute;
            top: 30%;
         }
         .circle:first-child {
            left: 42%;
            animation: rotate 1s linear infinite;
         }
         .circle:nth-child(2) {
            left: 50%;
         }
         .circle:last-child {
            left: 58%;
            animation: rotate 1s linear infinite;
         }
         .rectangle {
            background-color: white;
            height: 50px;
            width: 10px;
            position: absolute;
            top: 50%;
            animation: sizeUp 1s cubic-bezier(0.39, 0.575, 0.565, 1) infinite;
         }
         .rectangle:first-child {
            left: 42%;
            animation-delay: 0s;
         }
         .rectangle:nth-child(2) {
            left: 46%;
            animation-delay: 0.1s;
         }
         .rectangle:nth-child(3) {
            left: 50%;
            animation-delay: 0.2s;
         }
         .rectangle:nth-child(4) {
            left: 54%;
            animation-delay: 0.3s;
         }
         .rectangle:last-child {
            left: 58%;
            animation-delay: 0.4s;
         }
      </style>
   </head>

   <body>
      <div id="main">
         <div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
         </div>
         <div>
            <div class="rectangle"></div>
            <div class="rectangle"></div>
            <div class="rectangle"></div>
            <div class="rectangle"></div>
            <div class="rectangle"></div>
         </div>
      </div>
   </body>
</html>
