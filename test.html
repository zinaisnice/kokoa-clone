<!DOCTYPE html>
<html lang="ko">
   <head>
      <title>Home - My first website.</title>
      <link
         rel="shortcut icon"
         href="https://www.youtube.com/s/desktop/a98f809d/img/favicon.ico"
      />

      <style>
         @keyframes coinFlip {
            0% {
               transform: rotateY(0);
            }
            50% {
               transform: rotateY(180deg) translateY(100px);
            }
            100 % {
               transform: rotateY(360deg);
            }
         }
         img {
            border: 5px solid black;
            border-radius: 50%;
            width: 200px;
            animation: coinFlip 5s ease-in-out infinite;
         }
      </style>
   </head>

   <body>
      <img src="img/onepiece.jpg"
   </body>
